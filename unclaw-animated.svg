    <!-- Glow doux -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ombre l√©g√®re -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Animation de flottement -->
    <style><![CDATA[
      .logo-main {
        animation: pulseGlow 3.4s ease-in-out infinite;
      }

      .logo-shadow {
        opacity: 0.26;
        animation: shadowPulse 3.4s ease-in-out infinite;
      }

      .spark {
        opacity: 0;
        animation: twinkle 2.8s infinite ease-in-out;
      }

      .spark.s1 { animation-delay: 0s; }
      .spark.s2 { animation-delay: 0.4s; }
      .spark.s3 { animation-delay: 0.8s; }
      .spark.s4 { animation-delay: 1.2s; }
      .spark.s5 { animation-delay: 1.6s; }
      .spark.s6 { animation-delay: 2s; }

      .scanline {
        animation: scanMove 4.8s linear infinite;
      }

      .subtitle {
        animation: subtitleFade 3s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%, 100% { opacity: 0.96; }
        50% { opacity: 1; }
      }

      @keyframes shadowPulse {
        0%, 100% { opacity: 0.18; }
        50% { opacity: 0.34; }
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0; transform: translateY(0px) scale(0.85); }
        20% { opacity: 0.9; transform: translateY(-2px) scale(1); }
        50% { opacity: 0.4; transform: translateY(-4px) scale(1.08); }
        80% { opacity: 0.85; transform: translateY(-2px) scale(1); }
      }

      @keyframes scanMove {
        0%   { transform: translateX(-540px); opacity: 0; }
        8%   { opacity: 0.0; }
        15%  { opacity: 0.75; }
        50%  { opacity: 0.85; }
        85%  { opacity: 0.75; }
        100% { transform: translateX(980px); opacity: 0; }
      }

      @keyframes subtitleFade {
        0%, 100% { opacity: 0.65; }
        50% { opacity: 1; }
      }
    ]]></style>
  </defs>

