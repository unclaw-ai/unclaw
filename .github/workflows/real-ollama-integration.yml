name: real-ollama-integration

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"
  pull_request:
    paths:
      - ".github/workflows/real-ollama-integration.yml"
      - "config/**"
      - "pyproject.toml"
      - "src/unclaw/core/**"
      - "src/unclaw/llm/**"
      - "src/unclaw/tools/**"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/real-ollama-integration.yml"
      - "config/**"
      - "pyproject.toml"
      - "src/unclaw/core/**"
      - "src/unclaw/llm/**"
      - "src/unclaw/tools/**"
      - "tests/**"

concurrency:
  group: real-ollama-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-ollama:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REAL_OLLAMA: "1"
      REAL_OLLAMA_MODEL: "qwen3:1.7b"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Ollama
        run: |
          for attempt in 1 2 3; do
            curl -fsSL https://ollama.com/install.sh | sh && break
            echo "Ollama install attempt $attempt failed, retrying..."
            sleep 5
          done
          ollama --version

      - name: Start Ollama server
        run: |
          ollama serve >/tmp/ollama.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/ollama.log
          exit 1

      - name: Pull CI model
        run: ollama pull "${REAL_OLLAMA_MODEL}"

      - name: Warm up CI model
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          req = urllib.request.Request(
              "http://127.0.0.1:11434/api/generate",
              data=json.dumps({
                  "model": os.environ["REAL_OLLAMA_MODEL"],
                  "prompt": "Reply with exactly: ok",
                  "stream": False,
                  "keep_alive": "15m",
              }).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )

          with urllib.request.urlopen(req, timeout=600) as response:
              print(response.read().decode("utf-8"))
          PY

      - name: Run real Ollama integration subset
        run: >
          pytest -m real_ollama
          tests/test_ollama_provider.py
          tests/test_real_ollama_runtime_integration.py
          -q

      - name: Show Ollama log on failure
        if: failure()
        run: cat /tmp/ollama.log
