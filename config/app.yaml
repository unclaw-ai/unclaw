app:
  name: unclaw
  display_name: Unclaw
  environment: production
paths:
  data_dir: data
  logs_dir: logs
  sessions_dir: sessions
  cache_dir: cache
  files_dir: files
  database_file: memory/app.db
logging:
  level: DEBUG
  mode: full
  console_enabled: true
  file_enabled: true
  file_name: runtime.log
  include_reasoning_text: false
channels:
  terminal_enabled: true
  telegram_enabled: true
models:
  default_profile: main
thinking:
  default_enabled: false
providers:
  ollama:
    timeout_seconds: 60.0
runtime:
  tool_timeout_seconds: 15.0
  max_tool_calls_per_turn: 8
skills:
  enabled_skill_ids:
  - git_repo
  - local_text_search
  - weather
security:
  tools:
    files:
      allowed_roots:
      - .
    fetch:
      allow_private_networks: false
