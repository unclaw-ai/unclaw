app:
  name: unclaw
  display_name: Unclaw
  environment: production
paths:
  data_dir: data
  logs_dir: logs
  sessions_dir: sessions
  cache_dir: cache
  files_dir: files
  database_file: memory/app.db
logging:
  level: INFO
  mode: simple
  console_enabled: true
  file_enabled: true
  file_name: runtime.log
  include_reasoning_text: false
channels:
  terminal_enabled: true
  telegram_enabled: true
models:
  default_profile: main
thinking:
  default_enabled: false
providers:
  ollama:
    timeout_seconds: 60.0
runtime:
  tool_timeout_seconds: 15.0
  max_tool_calls_per_turn: 8
security:
  tools:
    files:
      # "." is resolved from the project/workspace root Unclaw discovers from the
      # current working directory at startup. Running Unclaw from ~/ can make a
      # very large part of your home directory part of the allowed file scope.
      # Safer: launch from a dedicated workspace/project folder or set explicit
      # allowed_roots paths here.
      allowed_roots:
      - .
    fetch:
      allow_private_networks: false
