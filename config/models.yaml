profiles:
  fast:
    provider: ollama
    model_name: llama3.2:3b
    temperature: 0.2
    thinking_supported: false
    tool_mode: none
    num_ctx: 4096
    keep_alive: 10m
  main:
    provider: ollama
    model_name: qwen3.5:4b
    temperature: 0.3
    thinking_supported: true
    tool_mode: native
    num_ctx: 8192
    keep_alive: 30m
    planner_profile: fast
  deep:
    provider: ollama
    model_name: qwen3.5:9b
    temperature: 0.2
    thinking_supported: true
    tool_mode: native
    num_ctx: 8192
    keep_alive: 10m
    planner_profile: fast
  codex:
    provider: ollama
    model_name: qwen2.5-coder:7b
    temperature: 0.1
    thinking_supported: true
    tool_mode: native
    num_ctx: 4096
    keep_alive: 10m
    planner_profile: fast
    # Restrict codex to code/system-relevant tools only.
    # Long-term memory, notes, and session-history tools are excluded because
    # they are irrelevant to a code-first assistant and caused the model to
    # call remember_long_term_memory on trivial prompts (CODEX-HARDENING-1).
    tool_allowlist:
      - read_text_file
      - list_directory
      - write_text_file
      - search_web
      - fetch_url_text
      - system_info
