# Example local model profiles.
# Replace model_name values to match the models installed on your machine.
profiles:
  fast:
    provider: ollama
    model_name: llama3.2:3b
    temperature: 0.2
    thinking_supported: false
    tool_mode: json_plan

  main:
    provider: ollama
    model_name: qwen3.5:4b
    temperature: 0.3
    thinking_supported: true
    tool_mode: json_plan

  deep:
    provider: ollama
    model_name: qwen3.5:9b
    temperature: 0.2
    thinking_supported: true
    tool_mode: json_plan
